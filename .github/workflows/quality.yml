name: Quality Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  risk-lint-and-build:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check
